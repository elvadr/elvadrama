kind = "web"
previewPath = "/"
title = "Channel Landing Page"
version = "1.0.0"
id = "artifacts/channel-site"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19287

[services.development]
run = "pnpm --filter @workspace/channel-site run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/channel-site", "run", "build" ]
publicDir = "artifacts/channel-site/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19287"
BASE_PATH = "/"
